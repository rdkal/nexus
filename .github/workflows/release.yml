name: Release

# Publish prebuilt binaries when a version tag is pushed. install.sh and the
# self-update build step download these instead of requiring Go on the host.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          set -eu
          mkdir -p dist
          # Pure-Go SQLite (modernc) means CGO_ENABLED=0 cross-compiles cleanly.
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            echo "building $os/$arch"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "dist/nexus-$os-$arch" ./cmd/nexus
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w" -o "dist/nexus-pm-$os-$arch" ./cmd/nexus-pm
          done
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --notes "Prebuilt \`nexus\` and \`nexus-pm\` binaries for ${{ github.ref_name }} (linux/darwin, amd64/arm64)."
